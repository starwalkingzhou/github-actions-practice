name: Egg CI

on: push

jobs:
  job1:
    name: Explore Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Print working directory
        run: pwd
      - name: List files
        run: ls

  job2:
    name: Check Node on Windows
    runs-on: windows-latest
    steps:
      - name: Check Node version
        run: node -v

  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
